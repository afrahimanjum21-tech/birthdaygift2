<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Story Of My Garden.🌺🍁</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfaf7;
            --text-color: #2c2c2c;
            --accent-color: #8e7f7f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', 'Noto Serif Bengali', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            position: relative;
            padding: 20px;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, transform 0.8s ease;
            transform: translateY(15px);
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        h2 {
            font-weight: 300;
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        p {
            font-size: 1.05rem;
            line-height: 1.8;
            font-weight: 400;
            padding: 0 10px;
        }

        .btn {
            margin-top: 40px;
            padding: 12px 30px;
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .btn:active {
            background: var(--accent-color);
            color: white;
        }

        /* 1st page er nicher choto text er style */
        .hint-text {
            position: absolute;
            bottom: 40px;
            font-size: 0.75rem;
            color: #999;
            letter-spacing: 1px;
            font-style: italic;
        }

        #page3 {
            display: block;
            text-align: left;
            overflow-y: auto;
            padding: 40px 15px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        #page3::-webkit-scrollbar { display: none; }

        #story-container {
            width: 100%;
            margin-bottom: 30px;
        }

        .story-chunk {
            font-size: 1.05rem;
            line-height: 1.9;
            color: #333;
            white-space: pre-wrap;
            margin-bottom: 25px; 
            opacity: 0; 
        }

        .story-chunk.show {
            animation: fadeIn 2.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .line {
            width: 35px;
            height: 1px;
            background: var(--accent-color);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <!-- 1st and 2nd Page Audio (bdy.mp3) - শুধু এটাই লুপ হবে -->
    <audio id="bdyMusic" loop>
        <source src="bdy.mp3">
    </audio>

    <!-- 3rd Page Audio - Loop সরানো হয়েছে -->
    <audio id="bgMusic">
        <source src="aud.mp3">
    </audio>

    <!-- 2nd Page Audio - Loop নেই -->
    <audio id="vceMusic">
        <source src="vce.mp3">
    </audio>

    <div class="container">
        <div id="page1" class="page active">
            <h2>SEPTEMBER 21</h2>
            <div class="line"></div>
            <p>"The Day!"</p>
            <button class="btn" onclick="goToPage2()">Click to open</button>
            
            <p class="hint-text">(touch anywhere first)</p>
        </div>

        <div id="page2" class="page">
            <p>বছরের প্রতিটি দিনই সমান, একই রকম।<br>কিন্তু, তার পরও দুই-একটা দিন একটু অসামান্য হয়ে ওঠে।</p>
            <div class="line"></div>
            <p>কেন? চলো বলি...</p>
            <button class="btn" onclick="playMusicAndNext()">Read the story</button>
        </div>

        <div id="page3" class="page">
            <div id="story-container"></div>
            <div style="height: 150px;"></div>
        </div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const vceMusic = document.getElementById('vceMusic');
        const bdyMusic = document.getElementById('bdyMusic');
        const page3 = document.getElementById("page3");

        // --- নতুন যোগ করা কোড (অডিও শেষ হলে জোরপূর্বক পজ করা) ---
        music.addEventListener('ended', function() {
            music.pause();
        });

        vceMusic.addEventListener('ended', function() {
            vceMusic.pause();
        });
        // -----------------------------------------------------------

        // স্ক্রিনের যেকোনো জায়গায় প্রথমবার টাচ করলেই bdy.mp3 শুরু হবে (Autoplay bypass করার জন্য)
        document.body.addEventListener('click', function() {
            if (bdyMusic.paused && !document.getElementById('page3').classList.contains('active')) {
                bdyMusic.play().catch(e => console.log("bdyMusic autoplay blocked", e));
            }
        }, { once: true });

        function showPage(pageNumber) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById('page' + pageNumber).classList.add('active');
            
            if(pageNumber === 3) {
                page3.scrollTop = 0;
            }
        }

        function goToPage2() {
            showPage(2);
            // যদি ইউজার স্ক্রিনে টাচ না করেই সরাসরি বাটনে ক্লিক করে, তবে নিশ্চিত করা হচ্ছে যেন bdy.mp3 বাজে
            if (bdyMusic.paused) {
                bdyMusic.play().catch(e => console.log("bdy audio play blocked", e));
            }
            // ২য় পেজের ভয়েস প্লে হবে (bdy.mp3 বন্ধ হবে না)
            vceMusic.play().catch(e => console.log("Voice audio play blocked", e));
        }

        function playMusicAndNext() {
            // ২য় পেজের vce.mp3 থামানো হচ্ছে
            vceMusic.pause();
            vceMusic.currentTime = 0;

            // bdy.mp3 থামানো হচ্ছে (যেহেতু ৩য় পেজ চলে আসবে)
            bdyMusic.pause();
            bdyMusic.currentTime = 0;

            // ৩য় পেজের মিউজিক চালু করা হচ্ছে
            music.play().catch(e => console.log("Music play blocked", e));
            showPage(3);
            
            // ৩য় পেজে আসার একটু পর এনিমেশন শুরু হবে
            setTimeout(startRevealing, 500);
        }

        const storyText = `Hiii!!🙂

কেমন আছো?🙂

খুব ভালো আছো আশা করছি।

কেন? নেই?

আচ্ছা চলো, তোমাকে আজকে একটা গল্প শোনায়।...


আজকে কোন দিন জানো?

"21 September, Monday."

খুব সাধারণ একটা দিন। বিশেষ কোনো কিছুই নেই আজকের দিনে। অন্যান্য সব দিনের মতই সাধারণ একটা দিন। অন্যান্য দিনের মত সাধারণ ভাবেই রাত কেটে সূর্য উঠেছে। পাখিরা গান গেয়েছে, সূরেরও পরিবর্তন হয়নি কোনোরকম, সেই একই ভাব, একই সূর, একই রকম কিচিরমিচির।


কেও মোবাইল ফোন এর এলার্মে, কেও ঘড়ির এলার্মে কিংবা এখনো হয়তো কেও কেও মরগের ডাকে অন্যান্য দিনের মত একই ভাবে ঘুম থেকে উঠেছে। বিশ্বাস কর, কারো মধ্যে কোনোরকম পরিবর্তন আসেনি। কোনো মানুষের জন্যই দিনটা বিশেষ কিছু নয়।


কিন্তু তার পরও, কেও কেও দিনটাকে উদ্যাপন করছে।

কারা?

-প্রকৃতিরা।

পরিবেশ, বাতাস, মাটি এরা সবাই মিলে মহানন্দে আনন্দ-উৎসব করছে আজকে।

কারণ কি যানো?

কারণ, আজ থেকে কিছু বছর আগে, ২০০৯ এ, পৃথিবীর বুকে একটা নতুন ধরনের ফুল ফুটেছিল। জান্নাতি ফুল। যার সুঘ্রাণ এ ওইদিন বাতাস মুখরিত হয়েছিল, যার পাপড়ির দোলনের শব্দ মাতিয়ে তুলেছিল পরিবেশ, যার সুন্দর্যে মাতাল হয়েছিল প্রকৃতি।

মাটি ওইদিন কেঁদে ভিজে পড়েছিল সর্বত্র, কারণ দেখেছে সে সেই ফুল, কিন্তু এখনো স্পর্শ করতে পারেনি তাকে।

আজ মাটিও আনন্দে আকুল, সেই ফুল এখন হাটতে শিখেছে। বাতাসেরও আর আনন্দের শেষ নেই। সেই ফুলের কুসুম পর্যন্ত বয়ে বেরিয়ে আসতে পারে আজ সে। কোমল প্রবাহের মাধ্যমে তার আনন্দ জানান দিচ্ছে। আর প্রকৃতি? সে তো মায়াময়ী। এতো আনন্দের মাঝেও ধরে রেখেছে নিজের কঠিন রুপ। যদিও সেটা পুরোপুরি ভাবে ধরে রাখতে পারেনি। একটু গলেছে তো সেও আজ। আজকে যে তার ওই ফুলের জন্মদিন।।


একটা মাজার ব্যাপার কি জানো?


সেই ফুল কিন্তু এখন আর প্রকৃতির নেই।

আজ থেকে কিছু বছর আগে, সেই ফুলকে দেখেছিলাম আমি। অনেক পছন্দ হয়ে গেছিল আমার। তার সুবাসে সে আনাকেও পাগল করেছিলো। কি করবো বল? এই ধরনের ফুলের দেখা তো আগে কখনো মেলেনি। দেখেই আমি আবদার করে বসি প্রকৃতির কাছে। সে কোনো মতে দিতে নারাজ। সে-ই বা কি করবে বল? ফুলটা তো তারও খুব প্রিয়। দির্ঘ্য পাঁচ বছর রোজ আবদার করার পর অবশেষে সে তার অতি প্রিয় ফুল আমাকে দিয়ে দিলো।

যদিও দেওয়ার আগে অনেক কড়া ভাবে আদেশ দিয়ে দিয়েছে "ফুলে যেন কোনো দাগ না পড়ে"। আমি রাজি হয়ে গেছি।

আজ কতটা যত্ন নিচ্ছি তা হয়তো যানি না। কিন্তু খুব চেষ্টা করছি তাকে আগলে রাখার।

কারণ সেই ফুল এখন আমার।


আজো একি ভাবে সুঘ্রাণ ছড়াচ্ছ ফুল তুমি।

ঘ্রান এর মায়ায় বেধে রেখেছো আমায় আজো।

এভাবেই রেখো বাকিটাও please.

Happy Birthday🎉💝💙🍫

        function startRevealing() {
            const container = document.getElementById("story-container");
            container.innerHTML = '';
            
            const paragraphs = storyText.split(/\n\s*\n/).filter(p => p.trim() !== '');
            
            paragraphs.forEach((text, i) => {
                const p = document.createElement("div");
                p.className = "story-chunk";
                p.textContent = text.trim();
                
                p.style.animationDelay = (i * 0.25) + "s"; 
                
                container.appendChild(p);
            });

            setTimeout(() => {
                document.querySelectorAll('.story-chunk').forEach(chunk => {
                    chunk.classList.add('show');
                });
            }, 50);
        }
    </script>
</body>
</html>
