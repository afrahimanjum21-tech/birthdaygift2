<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Story of My Garden.🌺🍁</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfaf7;
            --text-color: #2c2c2c;
            --accent-color: #8e7f7f;
            --alert-bg: rgba(44, 44, 44, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', 'Noto Serif Bengali', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            position: relative;
            padding: 20px;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, transform 0.8s ease;
            transform: translateY(15px);
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        h2 {
            font-weight: 300;
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        p {
            font-size: 1.05rem;
            line-height: 1.8;
            font-weight: 400;
            padding: 0 10px;
        }

        .btn {
            margin-top: 40px;
            padding: 12px 30px;
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .btn:active {
            background: var(--accent-color);
            color: white;
        }

        #page3 {
            display: block;
            text-align: left;
            overflow-y: auto;
            padding: 40px 15px;
            -webkit-overflow-scrolling: touch;
        }

        #page3::-webkit-scrollbar { display: none; }

        .typing-container {
            font-size: 1.05rem;
            line-height: 1.9;
            color: #333;
            white-space: pre-wrap;
            margin-bottom: 50px;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background-color: var(--accent-color);
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .line {
            width: 35px;
            height: 1px;
            background: var(--accent-color);
            margin: 20px 0;
        }

        /* কাস্টম পপ-আপ স্টাইল */
        .custom-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--alert-bg);
            color: #fff;
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            z-index: 9999;
            width: 80%;
            max-width: 300px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-size: 0.95rem;
            pointer-events: none;
        }

        .custom-popup.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -55%);
        }

    </style>
</head>
<body>

    <!-- কাস্টম পপ-আপ এলিমেন্ট -->
    <div id="scrollAlert" class="custom-popup">
        থামরে বেডি! আগে লিখে নিতে দে।<br>
        তার পর আরামে পড়বা। এখন পড়ার দরকার নাই।🙂
    </div>

    <audio id="bgMusic" loop>
        <source src="aud.mp3">
    </audio>

    <div class="container">
        <!-- Page 1 -->
        <div id="page1" class="page active">
            <h2>SEPTEMBER 21</h2>
            <div class="line"></div>
            <p>"The Day!"</p>
            <button class="btn" onclick="showPage(2)">Click to open</button>
        </div>

        <!-- Page 2 -->
        <div id="page2" class="page">
            <p>বছরের প্রতিটি দিনই সমান, একই রকম।<br>কিন্তু, তার পরও দুই-একটা দিন একটু অসামান্য হয়ে ওঠে।</p>
            <div class="line"></div>
            <p>কেন? চলো বলি...</p>
            <button class="btn" onclick="playMusicAndNext()">Read the story</button>
        </div>

        <!-- Page 3 -->
        <div id="page3" class="page">
            <div id="typewriter" class="typing-container"></div><span id="cursor" class="cursor"></span>
            <div style="height: 100px;"></div>
        </div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        let isTyping = false;
        let alertTimeout;

        function showPage(pageNumber) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        function playMusicAndNext() {
            music.play().catch(e => console.log("Music play blocked", e));
            showPage(3);
            setTimeout(startTyping, 1000);
        }

        // কাস্টম পপ-আপ দেখানোর ফাংশন
        function showPopup() {
            const popup = document.getElementById('scrollAlert');
            popup.classList.add('show');
            
            // আগে যদি কোনো টাইমার থাকে সেটা ক্লিয়ার করা
            clearTimeout(alertTimeout);
            
            // ২.৫ সেকেন্ড পর নিজে নিজেই ভ্যানিশ হয়ে যাবে
            alertTimeout = setTimeout(() => {
                popup.classList.remove('show');
            }, 2500);
        }

        // স্ক্রল করার চেষ্টা করলে পপ-আপ আসবে
        const page3 = document.getElementById("page3");
        
        function handleScrollAttempt(e) {
            if (isTyping) {
                e.preventDefault();
                showPopup();
            }
        }

        page3.addEventListener('wheel', handleScrollAttempt, { passive: false });
        page3.addEventListener('touchmove', handleScrollAttempt, { passive: false });

        const storyText = `Hiii!!🙂

কেমন আছো?🙂

খুব ভালো আছো আশা করছি।

কেন? নেই?

আচ্ছা চলো, তোমাকে আজকে একটা গল্প শোনায়।...


আজকে কোন দিন জানো?

"21 September, Monday."

খুব সাধারণ একটা দিন। বিশেষ কোনো কিছুই নেই আজকের দিনে। অন্যান্য সব দিনের মতই সাধারণ একটা দিন। অন্যান্য দিনের মত সাধারণ ভাবেই রাত কেটে সূর্য উঠেছে। পাখিরা গান গেয়েছে, সূরেরও পরিবর্তন হয়নি কোনোরকম, সেই একই ভাব, একই সূর, একই রকম কিচিরমিচির।


কেও মোবাইল ফোন এর এলার্মে, কেও ঘড়ির এলার্মে কিংবা এখনো হয়তো কেও কেও মরগের ডাকে অন্যান্য দিনের মত একই ভাবে ঘুম থেকে উঠেছে। বিশ্বাস কর, কারো মধ্যে কোনোরকম পরিবর্তন আসেনি। কোনো মানুষের জন্যই দিনটা বিশেষ কিছু নয়।


কিন্তু তার পরও, কেও কেও দিনটাকে উদ্যাপন করছে।

কারা?

-প্রকৃতিরা।

পরিবেশ, বাতাস, মাটি এরা সবাই মিলে মহানন্দে আনন্দ-উৎসব করছে আজকে।

কারণ কি যানো?

কারণ, আজ থেকে কিছু বছর আগে, ২০০৯ এ, পৃথিবীর বুকে একটা নতুন ধরনের ফুল ফুটেছিল। জান্নাতি ফুল। যার সুঘ্রাণ এ ওইদিন বাতাস মুখরিত হয়েছিল, যার পাপড়ির দোলনের শব্দ মাতিয়ে তুলেছিল পরিবেশ, যার সুন্দর্যে মাতাল হয়েছিল প্রকৃতি।

মাটি ওইদিন কেঁদে ভিজে পড়েছিল সর্বত্র, কারণ দেখেছে সে সেই ফুল, কিন্তু এখনো স্পর্শ করতে পারেনি তাকে।

আজ মাটিও আনন্দে আকুল, সেই ফুল এখন হাটতে শিখেছে। বাতাসেরও আর আনন্দের শেষ নেই। সেই ফুলের কুসুম পর্যন্ত বয়ে বেরিয়ে আসতে পারে আজ সে। কোমল প্রবাহের মাধ্যমে তার আনন্দ জানান দিচ্ছে। আর প্রকৃতি? সে তো মায়াময়ী। এতো আনন্দের মাঝেও ধরে রেখেছে নিজের কঠিন রুপ। যদিও সেটা পুরোপুরি ভাবে ধরে রাখতে পারেনি। একটু গলেছে তো সেও আজ। আজকে যে তার ওই ফুলের জন্মদিন।।


একটা মাজার ব্যাপার কি জানো?


সেই ফুল কিন্তু এখন আর প্রকৃতির নেই।

আজ থেকে কিছু বছর আগে, সেই ফুলকে দেখেছিলাম আমি। অনেক পছন্দ হয়ে গেছিল আমার। তার সুবাসে সে আনাকেও পাগল করেছিলো। কি করবো বল? এই ধরনের ফুলের দেখা তো আগে কখনো মেলেনি। দেখেই আমি আবদার করে বসি প্রকৃতির কাছে। সে কোনো মতে দিতে নারাজ। সে-ই বা কি করবে বল? ফুলটা তো তারও খুব প্রিয়। দির্ঘ্য পাঁচ বছর রোজ আবদার করার পর অবশেষে সে তার অতি প্রিয় ফুল আমাকে দিয়ে দিলো।

যদিও দেওয়ার আগে অনেক কড়া ভাবে আদেশ দিয়ে দিয়েছে "ফুলে যেন কোনো দাগ না পড়ে"। আমি রাজি হয়ে গেছি।

আজ কতটা যত্ন নিচ্ছি তা হয়তো যানি না। কিন্তু খুব চেষ্টা করছি তাকে আগলে রাখার।

কারণ সেই ফুল এখন আমার।


আজো একি ভাবে সুঘ্রাণ ছড়াচ্ছ ফুল তুমি।

ঘ্রান এর মায়ায় বেধে রেখেছো আমায় আজো।

এভাবেই রেখো বাকিটাও please.

Happy Birthday🎉💝💙🍫

(প্রথমে ভেবেছিলাম পুরোটা voice note এর মাধমে বলবো।🙂 কিন্তু আমার আবৃতির যেই অবস্থা🤧 পড়ে emotion আসা তো দূর, হয়তো হেসে দিতা🥲 তাই লিখে দিলাম🙂)`;

        let i = 0;
        const speed = 55; 
        const typewriterElement = document.getElementById("typewriter");

        function startTyping() {
            isTyping = true;
            if (i < storyText.length) {
                typewriterElement.textContent += storyText.charAt(i);
                i++;
                page3.scrollTop = page3.scrollHeight;
                setTimeout(startTyping, speed);
            } else {
                isTyping = false;
                document.getElementById("cursor").style.display = "none";
            }
        }
    </script>
</body>
</html>
